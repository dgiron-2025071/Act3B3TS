<div class="tarjeta">
  <h2>Registrar producto</h2>

  <form [formGroup]="formulario" (ngSubmit)="guardar()" class="formulario">
    <div class="campo">
      <label for="codigo_producto">Código</label>
      <input id="codigo_producto" type="text" formControlName="codigo_producto" />
      <small class="error" *ngIf="formulario.get('codigo_producto')?.touched && formulario.get('codigo_producto')?.invalid">
        El código es obligatorio.
      </small>
    </div>

    <div class="campo">
      <label for="nombre_producto">Nombre</label>
      <input id="nombre_producto" type="text" formControlName="nombre_producto" />
      <small class="error" *ngIf="formulario.get('nombre_producto')?.touched && formulario.get('nombre_producto')?.invalid">
        El nombre es obligatorio.
      </small>
    </div>

    <div class="campo">
      <label for="precio_producto">Precio</label>
      <input id="precio_producto" type="number" step="0.01" formControlName="precio_producto" />
      <small class="error" *ngIf="formulario.get('precio_producto')?.touched && formulario.get('precio_producto')?.invalid">
        El precio debe ser mayor que 0.
      </small>
    </div>

    <div class="campo">
      <label for="stock_producto">Stock</label>
      <input id="stock_producto" type="number" formControlName="stock_producto" />
      <small class="error" *ngIf="formulario.get('stock_producto')?.touched && formulario.get('stock_producto')?.invalid">
        El stock debe ser mayor o igual a 0.
      </small>
    </div>

    <button type="submit" class="boton-primario">Guardar</button>

    <p class="mensaje-exito" *ngIf="mensajeExito">{{ mensajeExito }}</p>
    <ul class="mensaje-error" *ngIf="erroresServidor.length">
      <li *ngFor="let err of erroresServidor">{{ err }}</li>
    </ul>
  </form>
</div>
